services:
  postgres:
    image: postgres:latest
    container_name: ploogle_pg
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d ploogle -U ploogle"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s

    env_file:
      - .env

  app:
    build:
      context: .
    container_name: ploogle_api
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ${BOOKS_DIR}:/opt/books

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./site
    container_name: ploogle_frontend
    environment:
      PLOOGLE_API_KEY: ${PLOOGLE_API_KEY}
      PLOOGLE_HOST: ploogle_api:${PORT}
    ports:
      - "3000:3000"

    depends_on:
      app:
        condition: service_started
